version: '3.8'

services:
  # 1. Servis: Redis
  redis-service:
    image: redis:latest
    container_name: rate-limiter-redis-compose  
    ports:
      - "6379:6379"
    networks:
      - rate-limiter-network

  # 2. Servis: Go Uygulaması
  go-app:
    build: . 
    container_name: meryem-app-compose
    ports:
      - "8080:8080"
    depends_on:
      - redis-service 
      - db-service # Go uygulaması artık PostgreSQL'in de açılmasını beklesin
    networks:
      - rate-limiter-network
    environment:
      REDIS_ADDR: ${REDIS_ADDR}
      APP_PORT: ${APP_PORT}
      DB_HOST: ${DB_HOST}
      DB_PORT: ${DB_PORT}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DB_NAME: ${DB_NAME}

  # 3. Servis: PostgreSQL Veritabanı
  db-service:
    image: postgres:15-alpine
    container_name: postgres_db
    environment:
    
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5432:5432"
    networks:
      - rate-limiter-network # Diğer servislerle konuşabilmesi için ağa bağladık
    volumes:
      - postgres_data:/var/lib/postgresql/data

networks:
  rate-limiter-network:
    driver: bridge

volumes:
  postgres_data:
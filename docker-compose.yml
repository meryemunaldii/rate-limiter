version: '3.8'

services:
  # 1. Servis:Redis
  redis-service:
    image: redis:latest
    container_name: rate-limiter-redis-compose  
    ports:
      - "6379:6379"
    networks:
      - rate-limiter-network

  # 2. Servis:Go Uygulaması
  go-app:
    build: . # Dockerfile'ın bu klasörde olduğunu belirtiyoruz, otomatik build edecek
    container_name: meryem-app-compose
    ports:
      - "8080:8080"
    depends_on:
      - redis-service # Önce Redis'in ayağa kalkmasını bekle diyoruz
    networks:
      - rate-limiter-network
    environment:
      REDIS_ADDR: "redis-service:6379"
      APP_PORT: "8080"

networks:
  rate-limiter-network:
    driver: bridge